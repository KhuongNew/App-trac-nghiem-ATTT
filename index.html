<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ôn tập trắc nghiệm An toàn bảo mật HTTT</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #64748b;
      --line: #d9e2ec;
      --brand: #2563eb;
      --brand-soft: #e8f0ff;
      --ok: #15803d;
      --ok-bg: #dcfce7;
      --bad: #b91c1c;
      --bad-bg: #fee2e2;
      --warn: #b45309;
      --warn-bg: #fff7ed;
      --shadow: 0 18px 50px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .10), transparent 34rem),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .app { width: min(1100px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 48px; }
    .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 22px; }
    .brand h1 { margin: 0; font-size: clamp(24px, 3vw, 36px); line-height: 1.1; letter-spacing: 0; }
    .brand p { margin: 8px 0 0; color: var(--muted); max-width: 760px; }
    .pill { border: 1px solid var(--line); border-radius: 999px; padding: 8px 12px; background: rgba(255,255,255,.75); color: var(--muted); white-space: nowrap; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; }
    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, .05);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 172px;
    }
    .card h2 { margin: 0; font-size: 18px; line-height: 1.35; }
    .count { color: var(--muted); font-size: 14px; }
    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--brand);
      color: #fff;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(37, 99, 235, .20); }
    button:disabled { opacity: .58; cursor: not-allowed; }
    .secondary { background: #0f172a; }
    .ghost { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .warn { background: var(--warn); }
    .quiz {
      background: rgba(255,255,255,.95);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 28px);
    }
    .quiz-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 18px; }
    .quiz-head h2 { margin: 0; font-size: clamp(18px, 2.4vw, 24px); }
    .progress { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .question { font-size: clamp(18px, 2.2vw, 23px); line-height: 1.45; font-weight: 750; margin: 16px 0; }
    .options { display: grid; gap: 10px; margin: 18px 0; }
    .option {
      width: 100%;
      text-align: left;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 650;
      box-shadow: none;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .option:hover:not(:disabled) { box-shadow: 0 8px 20px rgba(15, 23, 42, .07); }
    .letter { flex: 0 0 auto; width: 28px; height: 28px; border-radius: 999px; display: inline-grid; place-items: center; background: var(--brand-soft); color: var(--brand); }
    .option.correct { border-color: #86efac; background: var(--ok-bg); color: #14532d; }
    .option.wrong { border-color: #fecaca; background: var(--bad-bg); color: #7f1d1d; }
    .explain {
      display: none;
      border-radius: 8px;
      border: 1px solid #fed7aa;
      background: var(--warn-bg);
      padding: 14px;
      color: #7c2d12;
      line-height: 1.55;
      white-space: pre-line;
    }
    .explain.show { display: block; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    .card-actions { display: grid; gap: 8px; margin-top: auto; }
    .review-list { display: grid; gap: 12px; margin-top: 18px; }
    .review-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 16px;
      line-height: 1.55;
    }
    .review-question { font-weight: 750; margin-bottom: 10px; }
    .review-options { display: grid; gap: 6px; margin: 10px 0; padding: 0; list-style: none; }
    .review-options li { padding: 8px 10px; border-radius: 8px; background: #f8fafc; border: 1px solid #edf2f7; }
    .review-options li.correct { background: var(--ok-bg); border-color: #86efac; color: #14532d; font-weight: 750; }
    .review-explain { margin-top: 10px; color: #7c2d12; background: var(--warn-bg); border: 1px solid #fed7aa; border-radius: 8px; padding: 10px; white-space: pre-line; }
    .test-panel {
      background: rgba(255,255,255,.95);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, .05);
    }
    .test-panel h2 { margin: 0 0 8px; font-size: 20px; }
    .test-controls { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: end; margin-top: 14px; }
    .chapter-checks { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 8px; margin-top: 12px; }
    .chapter-checks label { display: flex; gap: 8px; align-items: flex-start; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: pointer; }
    .number-field { display: grid; gap: 6px; color: var(--muted); font-weight: 700; }
    .number-field input { width: 120px; border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px; font: inherit; color: var(--text); }
    .score-box { display: grid; gap: 10px; text-align: center; }
    .score-main { font-size: clamp(34px, 7vw, 64px); font-weight: 850; color: var(--brand); }
    .score-meta { color: var(--muted); line-height: 1.6; }
    .empty {
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }
    .hidden { display: none !important; }
    @media (max-width: 640px) {
      .app { width: min(100% - 20px, 1100px); padding-top: 18px; }
      .topbar, .quiz-head { flex-direction: column; }
      .pill { white-space: normal; }
      button { width: 100%; }
      .actions { flex-direction: column; }
      .test-controls { grid-template-columns: 1fr; }
      .number-field input { width: 100%; }
    }
  </style>
</head>

const WRONG_KEY = "atbm_wrong_questions_v1";
const letters = ["A", "B", "C", "D"];
let mode = "chapter";
let currentChapter = "";
let currentList = [];
let currentIndex = 0;
let answered = false;
let testState = null;
let audioContext = null;

function getAudioContext() {
  const AudioCtor = globalThis.AudioContext || globalThis.webkitAudioContext;
  if (!AudioCtor) return null;
  if (!audioContext) audioContext = new AudioCtor();
  if (audioContext.state === "suspended") audioContext.resume();
  return audioContext;
}

function playSoftTone(frequency, start, duration, volume = 0.035) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const oscillator = ctx.createOscillator();
  const gain = ctx.createGain();
  oscillator.type = "sine";
  oscillator.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  oscillator.connect(gain).connect(ctx.destination);
  oscillator.start(start);
  oscillator.stop(start + duration + 0.02);
}

function playAnswerSound(isCorrect) {
  try {
    const ctx = getAudioContext();
    if (!ctx) return;
    const now = ctx.currentTime;
    if (isCorrect) {
      playSoftTone(523.25, now, 0.13);
      playSoftTone(659.25, now + 0.11, 0.16);
    } else {
      playSoftTone(246.94, now, 0.12, 0.03);
      playSoftTone(196.00, now + 0.10, 0.18, 0.028);
    }
  } catch {
    // Audio is optional; quiz behavior must not depend on browser audio support.
  }
}

function getWrongIds() {
  try { return JSON.parse(localStorage.getItem(WRONG_KEY) || "[]"); }
  catch { return []; }
}

function setWrongIds(ids) {
  localStorage.setItem(WRONG_KEY, JSON.stringify([...new Set(ids)]));
}

function allQuestions() {
  return Object.entries(examData).flatMap(([chapter, questions]) => questions.map(q => ({ ...q, chapter })));
}

function renderMenu() {
  const menu = document.getElementById("menu");
  const quiz = document.getElementById("quiz");
  quiz.classList.add("hidden");
  menu.classList.remove("hidden");
  const total = allQuestions().length;
  const wrongCount = getWrongIds().length;
  document.getElementById("totalCount").textContent = `${total} câu hỏi`;
  const chapterOptions = Object.entries(examData).map(([chapter, questions], index) => `
    <label>
      <input type="checkbox" class="test-chapter" value="${index}" checked>
      <span>${escapeHtml(chapter)} <small>(${questions.length} câu)</small></span>
    </label>
  `).join("");
  const cards = Object.entries(examData).map(([chapter, questions], index) => `
    <article class="card">
      <h2>${chapter}</h2>
      <div class="count">${questions.length} câu hỏi</div>
      <div class="card-actions">
        <button type="button" class="chapter-btn" data-chapter-index="${index}">Bắt đầu ôn tập</button>
        <button type="button" class="ghost view-btn" data-chapter-index="${index}">Xem tất cả</button>
      </div>
    </article>
  `).join("");
  menu.innerHTML = `
    <section class="test-panel">
      <h2>Kiểm tra tổng hợp</h2>
      <div class="count">Chọn chương, nhập số câu từ 20 đến tối đa ${total}. Hệ thống sẽ đảo câu và đảo đáp án, chấm điểm cuối bài và lưu câu sai/không biết để ôn lại.</div>
      <div class="chapter-checks">${chapterOptions}</div>
      <div class="test-controls">
        <label class="number-field">
          Số câu
          <input id="testCount" type="number" min="20" max="${total}" value="${Math.min(50, total)}">
        </label>
        <button type="button" onclick="selectAllTestChapters()">Chọn tất cả</button>
        <button type="button" class="secondary" onclick="startMixedTest()">Bắt đầu kiểm tra</button>
      </div>
    </section>
    <div class="grid">
      ${cards}
      <article class="card">
        <h2>Ôn tập câu làm sai</h2>
        <div class="count">Hiện có: ${wrongCount} câu</div>
        <button class="warn" onclick="startWrongReview()" ${wrongCount ? "" : "disabled"}>Ôn tập câu làm sai</button>
        <button class="ghost" onclick="clearWrong()" ${wrongCount ? "" : "disabled"}>Xóa danh sách câu sai</button>
      </article>
    </div>
  `;
  menu.querySelectorAll(".chapter-btn").forEach(button => {
    button.addEventListener("click", () => {
      const chapter = Object.keys(examData)[Number(button.dataset.chapterIndex)];
      startChapter(chapter);
    });
  });
  menu.querySelectorAll(".view-btn").forEach(button => {
    button.addEventListener("click", () => {
      const chapter = Object.keys(examData)[Number(button.dataset.chapterIndex)];
      renderChapterReview(chapter);
    });
  });
  menu.querySelectorAll(".test-chapter").forEach(input => {
    input.addEventListener("change", updateTestCountLimit);
  });
  updateTestCountLimit();
}

function shuffleCopy(list) {
  const copy = [...list];
  for (let i = copy.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function withShuffledOptions(question) {
  const shuffled = shuffleCopy(question.options.map((option, index) => ({
    option,
    correct: index === question.answer
  })));
  return {
    ...question,
    options: shuffled.map(item => item.option),
    answer: shuffled.findIndex(item => item.correct)
  };
}

function prepareQuizList(questions) {
  return shuffleCopy(questions).map(withShuffledOptions);
}

function startChapter(chapter) {
  mode = "chapter";
  currentChapter = chapter;
  currentList = prepareQuizList(examData[chapter].map(q => ({ ...q, chapter })));
  currentIndex = 0;
  renderQuestion();
}

function startWrongReview() {
  const wrong = new Set(getWrongIds());
  currentList = prepareQuizList(allQuestions().filter(q => wrong.has(q.id)));
  if (!currentList.length) return renderMenu();
  mode = "wrong";
  currentChapter = "Ôn tập câu làm sai";
  currentIndex = 0;
  renderQuestion();
}

function selectedTestQuestions() {
  const selected = [...document.querySelectorAll(".test-chapter:checked")]
    .map(input => Object.keys(examData)[Number(input.value)]);
  return selected.flatMap(chapter => examData[chapter].map(q => ({ ...q, chapter })));
}

function selectAllTestChapters() {
  document.querySelectorAll(".test-chapter").forEach(input => input.checked = true);
  updateTestCountLimit();
}

function updateTestCountLimit() {
  const input = document.getElementById("testCount");
  if (!input) return;
  const max = selectedTestQuestions().length;
  input.max = String(max);
  if (Number(input.value) > max) input.value = String(max);
}

function startMixedTest() {
  const pool = selectedTestQuestions();
  if (!pool.length) {
    alert("Hãy chọn ít nhất một chương để kiểm tra.");
    return;
  }
  const requested = Number(document.getElementById("testCount").value);
  if (!Number.isFinite(requested) || requested < 20) {
    alert("Số câu kiểm tra tối thiểu là 20.");
    return;
  }
  const count = Math.min(requested, pool.length);
  mode = "test";
  currentChapter = "Kiểm tra tổng hợp";
  currentList = prepareQuizList(pool).slice(0, count);
  currentIndex = 0;
  testState = { total: currentList.length, correct: 0, wrong: 0, unknown: 0 };
  renderQuestion();
}

function clearWrong() {
  if (confirm("Xóa toàn bộ danh sách câu đã làm sai?")) {
    setWrongIds([]);
    renderMenu();
  }
}

function renderChapterReview(chapter) {
  const menu = document.getElementById("menu");
  const quiz = document.getElementById("quiz");
  menu.classList.add("hidden");
  quiz.classList.remove("hidden");
  const questions = examData[chapter];
  quiz.innerHTML = `
    <div class="quiz-head">
      <div>
        <h2>${escapeHtml(chapter)}</h2>
        <div class="progress">Xem toàn bộ đáp án và giải thích · ${questions.length} câu</div>
      </div>
      <button class="ghost" onclick="renderMenu()">Về menu</button>
    </div>
    <div class="review-list">
      ${questions.map((q, idx) => `
        <article class="review-item">
          <div class="review-question">Câu ${idx + 1}. ${escapeHtml(q.question)}</div>
          <ul class="review-options">
            ${q.options.map((opt, optionIndex) => `
              <li class="${optionIndex === q.answer ? "correct" : ""}">
                <strong>${letters[optionIndex]}.</strong> ${escapeHtml(opt)}
              </li>
            `).join("")}
          </ul>
          <div class="review-explain"><strong>Đáp án đúng được tô xanh.</strong> ${escapeHtml(q.explanation)}</div>
        </article>
      `).join("")}
    </div>
  `;
}

function renderQuestion() {
  const menu = document.getElementById("menu");
  const quiz = document.getElementById("quiz");
  menu.classList.add("hidden");
  quiz.classList.remove("hidden");
  answered = false;

  if (!currentList.length) {
    quiz.innerHTML = `<div class="empty">Không có câu hỏi trong chế độ này.</div><div class="actions"><button onclick="renderMenu()">Về menu</button></div>`;
    return;
  }

  const q = currentList[currentIndex];
  const suffix = mode === "test" && testState
    ? ` · Đúng ${testState.correct}/${testState.total}`
    : "";
  quiz.innerHTML = `
    <div class="quiz-head">
      <div>
        <h2>${currentChapter}</h2>
        <div class="progress">Câu ${currentIndex + 1} / ${currentList.length} · ${q.chapter}${suffix}</div>
      </div>
      <button class="ghost" onclick="renderMenu()">Về menu</button>
    </div>
    <div class="question">${escapeHtml(q.question)}</div>
    <div class="options">
      ${q.options.map((opt, i) => `
        <button class="option" onclick="selectAnswer(${i})" data-index="${i}">
          <span class="letter">${letters[i]}</span>
          <span>${escapeHtml(opt)}</span>
        </button>
      `).join("")}
    </div>
    <div id="explain" class="explain"><strong>💡 Giải thích:</strong> <span>${escapeHtml(q.explanation)}</span></div>
    <div class="actions">
      <button id="unknownBtn" class="ghost" onclick="markUnknown()">Không biết</button>
      <button id="nextBtn" onclick="nextQuestion()" disabled>Câu tiếp theo</button>
    </div>
  `;
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;
  const q = currentList[currentIndex];
  const buttons = [...document.querySelectorAll(".option")];
  buttons.forEach(btn => btn.disabled = true);
  buttons[q.answer].classList.add("correct");
  playAnswerSound(index === q.answer);
  if (index !== q.answer) {
    buttons[index].classList.add("wrong");
    setWrongIds([...getWrongIds(), q.id]);
    if (mode === "test" && testState) testState.wrong += 1;
  } else if (mode === "wrong") {
    setWrongIds(getWrongIds().filter(id => id !== q.id));
  } else if (mode === "test" && testState) {
    testState.correct += 1;
  }
  document.getElementById("explain").classList.add("show");
  document.getElementById("nextBtn").disabled = false;
  document.getElementById("unknownBtn").disabled = true;
}

function markUnknown() {
  if (answered) return;
  answered = true;
  const q = currentList[currentIndex];
  const buttons = [...document.querySelectorAll(".option")];
  buttons.forEach(btn => btn.disabled = true);
  buttons[q.answer].classList.add("correct");
  playAnswerSound(false);
  setWrongIds([...getWrongIds(), q.id]);
  if (mode === "test" && testState) testState.unknown += 1;
  document.getElementById("explain").classList.add("show");
  document.getElementById("nextBtn").disabled = false;
  document.getElementById("unknownBtn").disabled = true;
}

function nextQuestion() {
  currentIndex += 1;
  if (mode === "wrong") {
    const wrong = new Set(getWrongIds());
    currentList = currentList.filter(q => wrong.has(q.id));
    if (currentIndex > currentList.length - 1) currentIndex = 0;
  }
  if (currentIndex >= currentList.length) {
    if (mode === "test") {
      renderTestResult();
    } else {
      renderMenu();
    }
  } else {
    renderQuestion();
  }
}

function renderTestResult() {
  const menu = document.getElementById("menu");
  const quiz = document.getElementById("quiz");
  menu.classList.add("hidden");
  quiz.classList.remove("hidden");
  const total = testState?.total || currentList.length;
  const correct = testState?.correct || 0;
  const wrong = testState?.wrong || 0;
  const unknown = testState?.unknown || 0;
  const percent = total ? Math.round((correct / total) * 100) : 0;
  quiz.innerHTML = `
    <div class="quiz-head">
      <div>
        <h2>Kết quả kiểm tra</h2>
        <div class="progress">Các câu sai và không biết đã được lưu vào mục ôn tập lại.</div>
      </div>
      <button class="ghost" onclick="renderMenu()">Về menu</button>
    </div>
    <div class="score-box">
      <div class="score-main">${correct}/${total}</div>
      <div class="score-meta">
        Điểm: ${percent}%<br>
        Sai: ${wrong} câu · Không biết: ${unknown} câu · Cần ôn lại: ${getWrongIds().length} câu
      </div>
      <div class="actions">
        <button onclick="startWrongReview()" ${getWrongIds().length ? "" : "disabled"}>Ôn tập câu sai / không biết</button>
        <button class="ghost" onclick="renderMenu()">Về menu</button>
      </div>
    </div>
  `;
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

renderMenu();
